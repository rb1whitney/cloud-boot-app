apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cloud-boot-app.fullname" . }}
  labels:
    {{- include "cloud-boot-app.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "cloud-boot-app.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "cloud-boot-app.selectorLabels" . | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.port }}
        - protocol: TCP
          port: 8091 # Actuator port
